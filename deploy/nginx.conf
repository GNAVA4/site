# nginx site-конфиг для СтройМаг.
# Установка:  sudo cp deploy/nginx.conf /etc/nginx/sites-available/shop
#             sudo ln -s /etc/nginx/sites-available/shop /etc/nginx/sites-enabled/
#             sudo rm -f /etc/nginx/sites-enabled/default
#             sudo nginx -t && sudo systemctl reload nginx
# ВАЖНО: заменить ВАШ_ДОМЕН на реальный домен. TLS (443-блок + редирект) добавит certbot автоматически.

server {
    listen 80;
    server_name ВАШ_ДОМЕН www.ВАШ_ДОМЕН;

    # Загрузка фото товаров/категорий в админке
    client_max_body_size 20M;

    # Статика (собрана через collectstatic) — отдаёт nginx напрямую
    location /static/ {
        alias /opt/shop/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Загруженные изображения
    location /media/ {
        alias /opt/shop/media/;
        access_log off;
        expires 30d;
    }

    # Всё остальное — в gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # settings: SECURE_PROXY_SSL_HEADER
        proxy_redirect off;
    }
}
